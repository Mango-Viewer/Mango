<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Mango Story Builder Demo</title>
    <link rel="stylesheet" href="demo.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="hero__title">Mango Story Builder</div>
        <p class="hero__subtitle">
          Capture-first storytelling demo
        </p>
      </header>

      <section class="viewer-shell">
        <mango-viewer
          manifest-id="https://iiif.harvardartmuseums.org/manifests/object/299843"
          mode="story-builder"
          config='{"showThumbnails":false,"showSearch":false,"showMetadata":false,"showAnnotations":false,"showTools":false,"story":{"languages":["en","cy"]}}'
        ></mango-viewer>
      </section>
    </div>
    <script type="module" src="dist/mango-viewer-element.iife.js"></script>
  </body>
</html>
