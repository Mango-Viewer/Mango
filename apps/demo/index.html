<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mango Story Viewer Demo</title>
    <link rel="stylesheet" href="demo.css" />
  </head>
  <body>
    <div class="page page--story-viewer">
      <header class="hero">
        <div class="hero__title">Mango Story Viewer</div>
      </header>

      <section class="viewer-shell">
        <mango-viewer
          mode="story-viewer"
          story-url="test-story/demo.json"
          config='{"showThumbnails":false,"showSearch":false,"showMetadata":false,"showAnnotations":false,"showTools":false}'
        ></mango-viewer>

        <nav class="viewer-actions" aria-label="Story actions">
          <a class="viewer-actions__link" href="story-edit.html">Edit this story</a>
          <a class="viewer-actions__link" href="story-builder.html">
            Build a story from scratch
          </a>
          <a class="viewer-actions__link" href="annotation-editor.html">
            Open annotation editor
          </a>
          <a class="viewer-actions__link" href="viewer-cdn.html">
            Open CDN viewer demo
          </a>
          <a class="viewer-actions__link" href="story-layers.html">
            Layers Transition Demo
          </a>
        </nav>
      </section>
    </div>

    <script type="module" src="dist/mango-viewer-element.iife.js"></script>
  </body>
</html>
